# Server configuration
server.port=${PORT:8080}

# Database Configuration (PostgreSQL)
# Driven by environment variables so credentials can be attached later
# (e.g. on Railway, map these to the Postgres service's PG* variables).
# Falls back to a local Postgres instance for development.
spring.datasource.url=jdbc:postgresql://${PGHOST:postgres-production-bf6f.up.railway.app}:${PGPORT:5432}/${PGDATABASE:milkenrtedb}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
